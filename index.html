<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기독교 교육 프랜차이즈 마스터 플래너</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: var(--primary-color);
            font-size: 22px;
            margin-bottom: 5px;
        }
        .date-display {
            font-size: 14px;
            color: #7f8c8d;
            font-weight: bold;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .today-target-card {
            border-left: 5px solid var(--accent-color);
            background-color: #fff9f9;
        }
        .card-title {
            font-size: 13px;
            color: var(--accent-color);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .step-tag {
            background: #f1c40f;
            color: #fff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
        }
        .target-content {
            font-size: 17px;
            font-weight: bold;
            line-height: 1.6;
            color: var(--primary-color);
        }
        .routine-section h2 {
            font-size: 15px;
            color: var(--primary-color);
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 6px;
            margin-top: 20px;
        }
        .routine-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .routine-item input[type="checkbox"] {
            margin-top: 3px;
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .routine-text {
            font-size: 14px;
            line-height: 1.5;
        }
        .time-tag {
            background: #e2e8f0;
            color: #4a5568;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 6px;
            font-weight: bold;
        }
        .bible-verse {
            text-align: center;
            font-style: italic;
            color: #7f8c8d;
            font-size: 13px;
            margin-top: 30px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>프랜차이즈 마스터 플래너</h1>
        <div class="date-display" id="current-date">로딩 중...</div>
    </header>

    <!-- 오늘 딱 하나만 집중할 액션 플랜 -->
    <div class="card today-target-card">
        <div class="card-title">
            <span>오늘의 빌드업 타겟</span>
            <span class="step-tag" id="step-tag">철학 정립</span>
        </div>
        <div class="target-content" id="today-action-plan">
            로딩 중...
        </div>
    </div>

    <!-- 매일 반복해야 하는 데일리 핵심 루틴 -->
    <div class="card">
        <div class="card-title" style="color: var(--primary-color);">매일 필수 데일리 루틴</div>
        
        <div class="routine-section">
            <h2>🌅 아침: 몰입과 축적</h2>
            <div class="routine-item">
                <input type="checkbox" id="r1">
                <label for="r1" class="routine-text"><span class="time-tag">30분</span> 기독교 교육 철학 독서 및 요약 노트 작성</label>
            </div>
            <div class="routine-item">
                <input type="checkbox" id="r2">
                <label for="r2" class="routine-text"><span class="time-tag">60분</span> 프랜차이즈 시스템 매뉴얼 매일 1페이지 작성</label>
            </div>
        </div>

        <div class="routine-section">
            <h2>☀️ 오후: 본업 집중 및 틈새 축적</h2>
            <div class="routine-item">
                <input type="checkbox" id="r3">
                <label for="r3" class="routine-text"><span class="time-tag">상시</span> 상담 피드백, 코칭 성공 사례 메모장에 아카이빙</label>
            </div>
            <div class="routine-item">
                <input type="checkbox" id="r4">
                <label for="r4" class="routine-text"><span class="time-tag">틈새</span> 떠오르는 브랜드명 메모 후 KIPRIS 상표권 검색</label>
            </div>
        </div>

        <div class="routine-section">
            <h2>🌃 저녁: 영향력 확장</h2>
            <div class="routine-item">
                <input type="checkbox" id="r5">
                <label for="r5" class="routine-text"><span class="time-tag">40분</span> 블로그 가치관 칼럼 업로드 또는 인스타 릴스 콘티 작성</label>
            </div>
            <div class="routine-item">
                <input type="checkbox" id="r6">
                <label for="r6" class="routine-text"><span class="time-tag">20분</span> 전국 지도 비전 보드 보며 선포 후 마감</label>
            </div>
        </div>
    </div>

    <div class="bible-verse">
        "네 시작은 미약하였으나 네 나중은 심히 창대하리라"<br>(욥기 8:7)
    </div>
</div>

<script>
    // 100가지 구체적 액션 플랜 데이터 배열
    const actionPlans = [
        // 100일 초소형 계단식 미션
const actionPlans = [
    // 1~25일차: 철학의 먼지 털기 (뇌 워밍업 단계)
    { step: "1단계 철학", text: "빈 종이와 펜을 책상 위에 올려두는 것으로 오늘 미션을 시작하세요." },
    { step: "1단계 철학", text: "종이에 '기독교 교육'을 생각했을 때 떠오르는 단어 딱 1개만 적으세요. (예: 비전)" },
    { step: "1단계 철학", text: "어제 적은 단어 옆에 단어 1개를 더 추가해 보세요. (예: 정직)" },
    { step: "1단계 철학", text: "마지막으로 단어 1개를 더 추가해서 총 3개의 핵심 단어를 완성하세요." },
    { step: "1단계 철학", text: "이 3개의 단어 중 내 마음에 가장 깊은 울림을 주는 단어 하나에 동그라미 치세요." },
    { step: "1단계 철학", text: "그 단어를 넣어서 '우리는 ___하는 곳이다'라는 문장의 빈칸을 채워보세요." },
    { step: "1단계 철학", text: "작성한 문장을 다듬어 15자 내외의 아주 짧은 브랜드 슬로건 초안을 메모장에 적으세요." },
    { step: "1단계 철학", text: "스마트폰 네이버 켜고 '기독교 대안학교'를 검색창에 치기만 하세요." },
    { step: "1단계 철학", text: "검색 결과에 나오는 학교 중 가장 이름이 마음에 드는 곳 1곳의 링크를 복사하세요." },
    { step: "1단계 철학", text: "복사한 링크를 내 카카오톡(나에게 보내기)에 전송해 두세요." },
    { step: "1단계 철학", text: "카톡에 보낸 링크를 열어 그 학교의 '교육 이념' 소개 페이지를 10초간 읽어보세요." },
    { step: "1단계 철학", text: "그들의 이념 중 '우리 센터에도 꼭 적용하고 싶다'고 느껴지는 단어 1개만 골라두세요." },
    { step: "1단계 철학", text: "스마트폰 메모장을 열고 '프랜차이즈 철학'이라는 제목의 메모를 새로 만드세요." },
    { step: "1단계 철학", text: "방금 만든 메모에 오늘까지 정리된 슬로건과 핵심 단어들을 다 집어넣으세요." },
    { step: "1단계 철학", text: "인터넷 서점(교보문고 등) 앱을 켜고 검색창에 '기독교 세계관 교육'을 검색하세요." },
    { step: "1단계 철학", text: "리뷰가 많거나 제목이 끌리는 책 딱 1권을 장바구니에 담으세요." },
    { step: "1단계 철학", text: "장바구니에 담긴 책을 주문하거나, 도서관에서 빌릴 계획을 세우세요. (책 확보하기)" },
    { step: "1단계 철학", text: "책이 도착하면 일단 책상 위 가장 잘 보이는 곳에 올려두세요." },
    { step: "1단계 철학", text: "책을 펼쳐 '차례(목차)' 페이지를 가볍게 제목 위주로 1분간 읽어보세요." },
    { step: "1단계 철학", text: "목차 중에서 가장 흥미로워 보이는 챕터 1개에 연필로 별표를 치세요." },
    { step: "1단계 철학", text: "그 별표 친 페이지를 펼쳐 딱 1페이지만 읽고 책을 덮으세요." },
    { step: "1단계 철학", text: "오늘 읽은 1페이지 중에서 가장 마음에 드는 문장 한 줄에 밑줄을 그으세요." },
    { step: "1단계 철학", text: "내가 평소 아이들에게 강조하는 성경 구절이나 신앙적 격언 딱 1개를 떠올려 보세요." },
    { step: "1단계 철학", text: "그 구절을 예쁜 글씨로 포스트잇에 적어 센터 책상 앞에 붙여두세요." },
    { step: "1단계 철학", text: "붙여둔 포스트잇을 소리 내어 한 번 읽으며 '이 가치로 프랜차이즈를 세우겠다' 다짐하세요." },

    // 26~50일차: 시스템의 디테일 (운영의 조각 모으기)
    { step: "2단계 시스템", text: "메모장을 열고 오늘 출근해서 가장 먼저 한 일(예: 문 열기, 환기) 1가지를 적으세요." },
    { step: "2단계 시스템", text: "이어서 오늘 오후에 반복적으로 한 업무(예: 학생 출결 확인, 교재 검사) 2가지를 적으세요." },
    { step: "2단계 시스템", text: "퇴근 전에 한 업무(예: 상담 일지 작성, 소등) 1가지를 적어 오늘 일과 스케치를 마치세요." },
    { step: "2단계 시스템", text: "적어둔 일과들을 보며 '나 없는 다른 지점에서도 무조건 매일 해야 하는 필수 행동' 3개를 골라내세요." },
    { step: "2단계 시스템", text: "학부모가 처음 센터 상담실에 들어와서 의자에 앉기까지의 나의 행동 동선을 기억해 보세요." },
    { step: "2단계 시스템", text: "학부모에게 건네는 첫인사말과 따뜻한 웰컴 음료 종류를 한 줄로 표준화하세요." },
    { step: "2단계 시스템", text: "최근 학부모 상담 중 가장 많이 나왔던 질문 딱 1가지만 질문지로 적어보세요." },
    { step: "2단계 시스템", text: "그 질문에 대해 내가 평소 답변하듯 소리 내어 말해보고 스마트폰 음성 메모로 녹음하세요." },
    { step: "2단계 시스템", text: "녹음된 음성을 들으며 '가장 핵심이 되는 답변 답변 문장' 1개만 텍스트로 받아 적으세요." },
    { step: "2단계 시스템", text: "현재 코칭 중인 학생 중 가장 변화가 극적이었던 아이 1명의 이름을 노트에 쓰세요." },
    { step: "2단계 시스템", text: "그 아이가 처음에 센터에 왔을 때 가졌던 가장 큰 문제점(예: 스마트폰 중독, 무계획)을 적으세요." },
    { step: "2단계 시스템", text: "내가 그 아이의 문제점을 고쳐주기 위해 건넸던 결정적인 코칭 멘트나 피드백을 기억해 내세요." },
    { step: "2단계 시스템", text: "결과적으로 그 아이가 이뤄낸 성과(예: 전과목 만점, 태도 변화)를 구체적인 수치나 사실로 적으세요." },
    { step: "2단계 시스템", text: "이 스토리를 '1. 비포, 2. 코칭 솔루션, 3. 애프터'로 줄바꿈하여 깔끔하게 정돈하세요." },
    { step: "2단계 시스템", text: "컴퓨터 바탕화면에 새 폴더를 만들고 이름을 '기독교_교육_프랜차이즈_매뉴얼'로 지정하세요." },
    { step: "2단계 시스템", text: "그 폴더 안에 들어가 새 텍스트 문서를 만들고 이름을 '01_학부모_상담_가이드'로 만드세요." },
    { step: "2단계 시스템", text: "또 하나의 새 문서를 만들고 이름을 '02_학생_코칭_가이드'로 만드세요." },
    { step: "2단계 시스템", text: "앞서 기록했던 상담 답변 문장과 학생 성공 스토리를 각 문서 파일 안에 복사-붙여넣기 하세요." },
    { step: "2단계 시스템", text: "우리 센터 학생들이 매일 쓰는 학습 플래너나 시간표 양식 파일을 컴퓨터로 열어보세요." },
    { step: "2단계 시스템", text: "플래너 구석에 '오늘 하루 하나님이 주신 시간 청지기 점수' 같은 기독교적 요소를 넣을 작은 칸을 눈으로 점찍으세요." },
    { step: "2단계 시스템", text: "실제로 그 양식에 작은 수정 사항을 반영하여 '가맹점용 플래너 양식 v1'으로 따로 저장하세요." },
    { step: "2단계 시스템", text: "네이버에 '소상공인시장진흥공단'을 검색해서 공식 홈페이지 링크를 클릭하세요." },
    { step: "2단계 시스템", text: "홈페이지 검색창에 '프랜차이즈 지원'이라고 검색어를 입력해 보세요." },
    { step: "2단계 시스템", text: "검색 결과 중 올해 진행 중이거나 마감된 공고 제목 2개만 캡처해서 내 카톡으로 보내두세요." },
    { step: "2단계 시스템", text: "캡처한 공고를 보며 '나중에 지원할 때 어떤 서류들이 필요한지' 자격 요건만 가볍게 30초 동안 읽어보세요." },

    // 51~75일차: 브랜드의 옷 입히기 (영향력 확장 단계)
    { step: "3단계 브랜딩", text: "인스타그램 앱을 켜고 내 비즈니스 계정 프로필 홈 화면을 가만히 바라보세요." },
    { step: "3단계 브랜딩", text: "'프로필 수정' 버튼을 누르고 기존 한 줄 소개 글을 전체 복사해서 메모장에 백업해 두세요." },
    { step: "3단계 브랜딩", text: "소개 글에 '크리스천', '비전 학습', '가치관 코칭' 같은 정체성 단어 중 마음에 드는 단어 2개를 선정하세요." },
    { step: "3단계 브랜딩", text: "선정한 단어들을 녹여서 프로필 한 줄 소개를 20자 이내로 새롭게 고쳐 쓰세요." },
    { step: "3단계 브랜딩", text: "수정된 한 줄 소개를 인스타그램 프로필에 실제 적용하고 '완료' 버튼을 누르세요." },
    { step: "3단계 브랜딩", text: "네이버 블로그 앱을 켜고 '글쓰기' 버튼을 누르세요." },
    { step: "3단계 브랜딩", text: "제목에 '왜 지금 우리 아이들에게 기독교 세계관 교육이 필요할까?'라고 적으세요." },
    { step: "3단계 브랜딩", text: "아직 내용을 쓰지 말고 우측 상단의 '임시저장' 버튼을 누르고 창을 닫으세요." },
    { step: "3단계 브랜딩", text: "오늘 스마트폰 메모장을 열고, 기독교 가치관 교육에 대한 나의 핵심 생각 2줄만 메모장에 자유롭게 낙서하듯 적으세요." },

    { step: "3단계 브랜딩", text: "오타가 없는지 위에서 아래로 한 번 가볍게 읽어본 뒤 다시 임시저장 하세요." },
    { step: "3단계 브랜딩", text: "글 맨 아래에 센터 연락처나 위치 정보를 넣고, 과감하게 '발행' 버튼을 눌러 세상에 공개하세요." },
    { step: "3단계 브랜딩", text: "스마트폰 카메라를 들고 센터 안에서 빛이 가장 잘 드는 각도를 찾아 사진 1장을 찰칵 촬영하세요." },
    { step: "3단계 브랜딩", text: "센터 소품(책상, 성경책, 플래너 등)을 감성적인 느낌으로 가까이서 1장 더 촬영하세요." },
    { step: "3단계 브랜딩", text: "인스타그램 릴스 탭을 누르고 다른 교육 전문가들이 올린 짧은 영상 3개를 슥슥 넘겨보며 구경하세요." },
    { step: "3단계 브랜딩", text: "그들이 영상 위에 얹은 자막 중 대중의 시선을 사로잡는 강력한 문구 포맷 1개를 벤치마킹용으로 받아 적으세요." },
    { step: "3단계 브랜딩", text: "메모장을 켜고 '아이의 무너진 성적을 살리는 딱 한 가지 질문' 같은 릴스 자막 문구를 하나 만드세요." },
    { step: "3단계 브랜딩", text: "Canva(캔바) 앱이나 스마트폰 기본 편집 기능으로 촬영해 둔 사진 위에 그 자막 문구를 얹으세요." },
    { step: "3단계 브랜딩", text: "인스타그램 릴스 올리기를 누르고, 배경음악을 신나는 것으로 아무거나 하나 매칭하세요." },
    { step: "3단계 브랜딩", text: "만들어진 릴스 영상을 업로드하여 첫 번째 퍼스널 브랜딩 숏폼 콘텐츠를 완성하세요." },
    { step: "3단계 브랜딩", text: "네이버에 'CBMC' 또는 '기독교 크리스천 기업가 모임'을 검색해 공식 사이트에 접속하세요." },
    { step: "3단계 브랜딩", text: "내 활동 지역 근처에 지회가 있는지 위치 정보를 확인하고 정기 모임 요일을 메모해 두세요." },
    { step: "3단계 브랜딩", text: "Canva(캔바)에 접속해 검색창에 '교육 세미나 PPT'를 치고 가장 깔끔한 템플릿 1개를 선택하세요." },
    { step: "3단계 브랜딩", text: "템플릿의 표지 텍스트를 '[학부모 특강] 자기주도적 비전을 찾는 아이로 키우기'로 수정해 두세요." },

    // 76~100일차: 시각화와 영광 (미래 지도 그리기 및 마감)
    { step: "4단계 시각화", text: "종이 한 장을 펴고 내가 만들고 싶은 브랜드 이름에 들어갈 단어들을 자유롭게 브레인스토밍하세요." },
    { step: "4단계 시각화", text: "단어들을 조합하여 입에 착착 붙는 브랜드 후보 이름 딱 3개만 최종 후보로 추려내세요." },
    { step: "4단계 시각화", text: "특허청 키프리스(KIPRIS) 사이트에 접속하여 첫 번째 후보 이름을 검색창에 입력해 보세요." },
    { step: "4단계 시각화", text: "동일한 상표권이 교육 업종(업종 분류 확인)에 이미 등록되어 있는지 여부를 확인하세요." },
    { step: "4단계 시각화", text: "두 번째, 세 번째 후보 이름도 차례대로 검색하여 사용 가능한 안전한 이름을 선별하세요." },
    { step: "4단계 시각화", text: "구글 이미지 검색에서 '대한민국 백지도' 또는 '한국 지도'를 검색해 깨끗한 이미지 1개를 다운로드하세요." },
    { step: "4단계 시각화", text: "다운로드한 지도 파일을 컴퓨터 비전 폴더에 넣고 이름을 '전국_가맹_지도'로 변경하세요." },
    { step: "4단계 시각화", text: "그림판이나 이미지 편집 앱으로 지도를 열고, 현재 내 센터 위치에 빨간색 점을 찍고 '1호 직영점'이라고 쓰세요." },
    { step: "4단계 시각화", text: "수도권이나 인근 주요 거점 도시 중 가맹 2호점을 내고 싶은 지역에 두 번째 빨간 점을 찍으세요." },
    { step: "4단계 시각화", text: "전국에 총 10개의 가상 지점 점을 찍어보며 지도 위에 별망이 펼쳐지는 모습을 시각화하세요." },
    { step: "4단계 시각화", text: "미래 우리 프랜차이즈의 메인 컬러(예: 신뢰의 블루, 따뜻한 옐로우 등)를 상징할 색상 2가지를 결정하세요." },
    { step: "4단계 시각화", text: "가맹점주들이 입을 단정한 셔츠나 유니폼의 형태를 상상하며 이미지 1장을 핀터레스트 등에서 찾아 저장하세요." },
    { step: "4단계 시각화", text: "새 텍스트 문서를 만들고 제목을 '5개년_성장_로드맵'이라고 지정하세요." },
    { step: "4단계 시각화", text: "문서 안에 '1년차: 직영점 매뉴얼화, 3년차: 가맹 20호점, 5년차: 전국 100호점'이라고 큰 목표 수치를 적으세요." },
    { step: "4단계 시각화", text: "가맹점주가 계약을 맺었을 때 가장 먼저 체크해야 할 일(간판, 가구, 인테리어 등) 항목 3가지만 메모하세요." },
    { step: "4단계 시각화", text: "그 항목들을 순서대로 나열하여 '오픈 준비 체크리스트'라는 이름으로 매뉴얼 폴더에 저장하세요." },
    { step: "4단계 시각화", text: "그동안 컴퓨터 폴더와 스마트폰에 흩어져 있던 철학, 시스템, 브랜딩 파일들을 한 곳으로 무브(Move)하세요." },
    { step: "4단계 시각화", text: "통합 폴더 이름을 '[최종] 기독교 교육 프랜차이즈 시스템 v1.0'으로 멋지게 변경하세요." },
    { step: "4단계 시각화", text: "내 스마트폰 달력 앱을 켜고, 오늘부터 정확히 1년 뒤 날짜에 '직영 시스템 완성 및 첫 사업설명회 준비'라고 이벤트를 등록하세요." },
    { step: "4단계 시각화", text: "센터 거울 앞에 당당하게 서서 내 눈을 바라보세요." },
    { step: "4단계 시각화", text: "가슴을 펴고 '나는 대한민국 교육을 바꿀 기독교 프랜차이즈의 창업주다'라고 소리 내어 세 번 선포하세요." },
    { step: "4단계 시각화", text: "가맹 약정서 표지 디자인으로 쓰면 좋을 깔끔한 서류 양식을 컴퓨터에서 하나 다운로드 받아두세요." },
    { step: "4단계 시각화", text: "100일 동안 매일 기록하며 쌓인 데이터의 양을 확인하고 스스로에게 깊은 성취감을 선물하세요." },
    { step: "4단계 시각화", text: "내가 걸어온 100일의 기적적인 여정을 축하하기 위해 오늘 저녁 가장 좋아하는 음식을 나에게 대접하세요." },
    { step: "4단계 시각화", text: "완성된 설계도를 바탕으로, 이제 실제 행동으로 옮길 다음 시즌의 100일 마스터 플랜을 기대함으로 기획하세요." }
];

    function updatePlanner() {
        const now = new Date();
        
        // 날짜 표시 업데이트
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = String(now.getDate()).padStart(2, '0');
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        const dayName = days[now.getDay()];
        document.getElementById('current-date').innerText = `${year}년 ${month}월 ${date}일 (${dayName}요일)`;

        // 1년 중 몇 번째 날인지 계산하여 20개 계획을 매일 자동으로 순환시킴
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const oneDay = 1000 * 60 * 60 * 24;
        const dayOfYear = Math.floor(diff / oneDay);
        
        const index = dayOfYear % actionPlans.length;
        const todayPlan = actionPlans[index];
        
        // 화면에 최종 주입
        document.getElementById('step-tag').innerText = todayPlan.step;
        document.getElementById('today-action-plan').innerText = todayPlan.text;
    }

    // 실행
    updatePlanner();
</script>
